<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Visualisations and statistics from the Allacci Digitale database.">
    <link rel="alternate" hreflang="it" href="https://allacci-digitale.github.io/stats.html">
    <link rel="alternate" hreflang="en" href="https://allacci-digitale.github.io/stats-en.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Aboreto&display=swap">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>main { max-width: 1100px; }</style>
    <title>Stats - Allacci Digitale</title>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li class="site-title">Allacci Digitale</li>
                <li><a href="index-en.html">Home</a></li>
                <li><a href="bio-en.html">Authors</a></li>
                <li><a href="work-en.html">Work</a></li>
                <li><a href="stats-en.html">Stats</a></li>
                <li><a href="database-en.html">Database</a></li>
                <li class="button">
                    <a href="stats.html"><span aria-hidden="true">🇮🇹</span><span class="sr-only">Italiano</span></a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="stats">
            <h1>Stats</h1>
            <div class="dashboard-grid">
			
                <div class="stat-card">
                    <h2>Top 10 authors</h2>
                    <div class="chart-wrap"><canvas id="chartAuthors"></canvas></div>
                </div>

                <div class="stat-card">
                    <h2>Top 10 publishers</h2>
                    <div class="chart-wrap"><canvas id="chartPublishers"></canvas></div>
                </div>

                <div class="stat-card">
                    <h2>Genre distribution</h2>
                    <div class="chart-wrap"><canvas id="chartGenres"></canvas></div>
                </div>

                <div class="stat-card">
                    <h2>Chronological distribution (by decade)</h2>
                    <div class="chart-wrap"><canvas id="chartTimeline"></canvas></div>
                </div>

                <div class="stat-card">
                    <h2>Publication locations</h2>
                    <iframe
                        src="https://allacci-digitale.github.io/images/allacci-locations.html"
                        title="Map of publication locations"
                        loading="lazy"
                    ></iframe>
                </div>

                <div class="stat-card">
                    <h2>Author–publisher network</h2>
                    <iframe
                        src="https://allacci-digitale.github.io/images/network/"
                        title="Author-publisher relationship network"
                        loading="lazy"
                    ></iframe>
                </div>

            </div>
        </section>
    </main>

    <footer>
        <p><a href="credits-en.html">Credits</a> &mdash; <a href="https://github.com/allacci-digitale/allacci-digitale.github.io"><i class="fab fa-github" aria-hidden="true"></i> GitHub</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
    /* ── palette ─────────────────────────────────────────────────────── */
    const MAROON   = '#800000';
    const MAROON_A = 'rgba(128,0,0,0.80)';
    const MAROON_H = 'rgba(165,42,42,0.92)';
    const PALETTE  = [
        '#800000','#a52a2a','#bf4040','#d35f5f',
        '#8e44ad','#2980b9','#16a085','#27ae60',
        '#f39c12','#d35400','#7f8c8d','#2c3e50'
    ];

    /* ── helpers ─────────────────────────────────────────────────────── */
    function stripHtml(s) {
        return s ? s.replace(/<[^>]+>/g, '').trim() : '';
    }

    function truncate(s, n = 24) {
        return s.length > n ? s.slice(0, n - 1) + '\u2026' : s;
    }

    /* ── data processing (single pass) ───────────────────────────────── */
    function processData(entries) {
        const authors = {}, publishers = {}, genres = {}, decades = {};

        for (const e of entries) {
            const a = stripHtml(e['autore/author']);
            const p = stripHtml(e['editore/publisher']);
            const g = stripHtml(e['genere/genre']);
            const y = Number(e['anno/year']);

            if (a && a !== 'Unknown') authors[a]    = (authors[a]    || 0) + 1;
            if (p && p !== 'Unknown') publishers[p] = (publishers[p] || 0) + 1;
            if (g && g !== 'Unknown') genres[g]     = (genres[g]     || 0) + 1;
            if (y) {
                const d = Math.floor(y / 10) * 10;
                decades[d] = (decades[d] || 0) + 1;
            }
        }

        const top = (obj, n) =>
            Object.entries(obj).sort((a, b) => b[1] - a[1]).slice(0, n);

        return {
            topAuthors:    top(authors, 10),
            topPublishers: top(publishers, 10),
            genres:        Object.entries(genres).sort((a, b) => b[1] - a[1]),
            timeline:      Object.entries(decades).sort((a, b) => +a[0] - +b[0]),
        };
    }

    /* ── chart: horizontal bar (authors / publishers) ────────────────── */
    function drawHBar(id, pairs) {
        const rev = [...pairs].reverse();
        new Chart(document.getElementById(id), {
            type: 'bar',
            data: {
                labels: rev.map(([name]) => truncate(name)),
                datasets: [{
                    data: rev.map(([, n]) => n),
                    backgroundColor: MAROON_A,
                    hoverBackgroundColor: MAROON_H,
                    borderRadius: 3,
                    borderSkipped: false,
                }],
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: {
                        beginAtZero: true,
                        grid: { color: '#f0f0f0' },
                        ticks: { color: '#666', font: { size: 11 } },
                    },
                    y: {
                        grid: { display: false },
                        ticks: { color: '#333', font: { size: 12 } },
                    },
                },
            },
        });
    }

    /* ── chart: doughnut (genres) ─────────────────────────────────────── */
    function drawGenres(genres) {
        const total     = genres.reduce((s, [, c]) => s + c, 0);
        const threshold = total * 0.02;          // < 2 % → "Other"
        const main      = genres.filter(([, c]) => c >= threshold);
        const otherN    = genres.filter(([, c]) => c < threshold)
                                .reduce((s, [, c]) => s + c, 0);
        if (otherN > 0) main.push(['Other', otherN]);

        new Chart(document.getElementById('chartGenres'), {
            type: 'doughnut',
            data: {
                labels: main.map(([name]) => name),
                datasets: [{
                    data: main.map(([, n]) => n),
                    backgroundColor: PALETTE.slice(0, main.length),
                    borderWidth: 2,
                    borderColor: '#fff',
                    hoverOffset: 6,
                }],
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '54%',
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            font: { size: 11 },
                            color: '#444',
                            boxWidth: 13,
                            padding: 7,
                        },
                    },
                    tooltip: {
                        callbacks: {
                            label: ctx => {
                                const pct = ((ctx.parsed / total) * 100).toFixed(1);
                                return ` ${ctx.label}: ${ctx.parsed} (${pct}%)`;
                            },
                        },
                    },
                },
            },
        });
    }

    /* ── chart: vertical bar (timeline by decade) ────────────────────── */
    function drawTimeline(timeline) {
        new Chart(document.getElementById('chartTimeline'), {
            type: 'bar',
            data: {
                labels: timeline.map(([d]) => `${d}s`),
                datasets: [{
                    data: timeline.map(([, n]) => n),
                    backgroundColor: MAROON_A,
                    hoverBackgroundColor: MAROON_H,
                    borderRadius: 3,
                }],
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: {
                            color: '#555',
                            font: { size: 11 },
                            maxRotation: 45,
                            minRotation: 45,
                        },
                    },
                    y: {
                        beginAtZero: true,
                        grid: { color: '#f0f0f0' },
                        ticks: { color: '#666', font: { size: 11 } },
                    },
                },
            },
        });
    }

    /* ── init ────────────────────────────────────────────────────────── */
    async function init() {
        try {
            const entries = await fetch('data/database.json').then(r => r.json());
            const data    = processData(entries);
            drawHBar('chartAuthors',    data.topAuthors);
            drawHBar('chartPublishers', data.topPublishers);
            drawGenres(data.genres);
            drawTimeline(data.timeline);
        } catch (err) {
            console.error('Failed to load database.json:', err);
        }
    }

    init();
    </script>

</body>
</html>
