<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Allacci – Rete autori–editori</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #eee;
    }

    #cy {
      width: 100vw;
      height: 100vh;
      position: absolute;
      inset: 0;
    }

    /* ── Loader ──────────────────────────────────────────────── */
    #loader {
      position: fixed;
      inset: 0;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #333;
      border-top-color: #800000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader p { color: #777; font-size: 0.85em; letter-spacing: 0.04em; }

    /* ── Search ──────────────────────────────────────────────── */
    #search-wrap {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #search-input {
      background: rgba(25,25,25,0.93);
      border: 1px solid #444;
      border-radius: 6px;
      color: #eee;
      font-size: 0.82em;
      padding: 7px 11px;
      width: 210px;
      outline: none;
      transition: border-color 0.2s;
    }
    #search-input:focus { border-color: #800000; }
    #search-input::placeholder { color: #555; }
    #search-clear {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 50%;
      color: #888;
      cursor: pointer;
      display: none;
      font-size: 0.75em;
      line-height: 1;
      padding: 5px 7px;
      transition: background 0.15s, color 0.15s;
    }
    #search-clear:hover { background: #800000; border-color: #800000; color: #fff; }

    /* ── Zoom controls ───────────────────────────────────────── */
    #zoom-controls {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .zoom-btn {
      background: rgba(25,25,25,0.93);
      border: 1px solid #444;
      border-radius: 6px;
      color: #bbb;
      cursor: pointer;
      font-size: 1em;
      line-height: 1;
      padding: 7px 11px;
      transition: background 0.15s, color 0.15s;
    }
    .zoom-btn:hover { background: #800000; border-color: #800000; color: #fff; }

    /* ── Legend ──────────────────────────────────────────────── */
    #legend {
      position: absolute;
      bottom: 12px;
      right: 12px;
      z-index: 20;
      background: rgba(25,25,25,0.93);
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.76em;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; color: #ccc; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── Info panel ──────────────────────────────────────────── */
    #info-panel {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(18,18,18,0.96);
      border: 1px solid #444;
      border-left: 3px solid #800000;
      border-radius: 6px;
      padding: 12px 16px;
      min-width: 190px;
      max-width: 270px;
      display: none;
    }
    #info-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    #info-name { font-weight: 600; font-size: 0.95em; color: #fff; flex: 1; }
    #info-close {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 1em;
      line-height: 1;
      margin-left: 8px;
      padding: 0;
      transition: color 0.15s;
    }
    #info-close:hover { color: #fff; }
    #info-type {
      color: #888;
      font-size: 0.72em;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }
    #info-degree { color: #777; font-size: 0.78em; margin-bottom: 8px; }
    #info-connections {
      list-style: none;
      max-height: 130px;
      overflow-y: auto;
      font-size: 0.78em;
    }
    #info-connections::-webkit-scrollbar { width: 4px; }
    #info-connections::-webkit-scrollbar-track { background: transparent; }
    #info-connections::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    #info-connections li {
      color: #aaa;
      padding: 3px 0;
      border-bottom: 1px solid #222;
      cursor: pointer;
      transition: color 0.12s;
    }
    #info-connections li:last-child { border-bottom: none; }
    #info-connections li:hover { color: #fff; }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <p>Calcolo della rete in corso…</p>
  </div>

  <div id="cy"></div>

  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Cerca persona…" autocomplete="off">
    <button id="search-clear" title="Cancella ricerca">✕</button>
  </div>

  <div id="zoom-controls">
    <button class="zoom-btn" id="zoom-in"  title="Ingrandisci">+</button>
    <button class="zoom-btn" id="zoom-out" title="Riduci">−</button>
    <button class="zoom-btn" id="zoom-fit" title="Vista completa">⌖</button>
  </div>

  <div id="legend">
    <div class="legend-row">
      <div class="legend-dot" style="background:#800000"></div>
      <span>Autore</span>
    </div>
    <div class="legend-row">
      <div class="legend-dot" style="background:#2e6fac"></div>
      <span>Editore</span>
    </div>
  </div>

  <div id="info-panel">
    <div id="info-header">
      <div id="info-name"></div>
      <button id="info-close" title="Chiudi">✕</button>
    </div>
    <div id="info-type"></div>
    <div id="info-degree"></div>
    <ul id="info-connections"></ul>
  </div>

  <script>
  (async () => {

    /* ── helpers ──────────────────────────────────────────────── */
    const LOG_MIN = Math.log(50), LOG_MAX = Math.log(500);
    function vizSize(raw) {
      const t = (Math.log(Math.max(50, raw)) - LOG_MIN) / (LOG_MAX - LOG_MIN);
      return Math.round(10 + t * 32); // 10–42 px
    }

    /* ── load & convert data.json ─────────────────────────────── */
    const raw = await fetch('data.json').then(r => r.json());

    const elements = [
      ...raw.nodes.map(n => {
        const type = (n.attributes && n.attributes.type) || 'author';
        return {
          group: 'nodes',
          data: {
            id:    n.id,
            label: n.label,
            type,
            color: type === 'publisher' ? '#2e6fac' : '#800000',
            size:  vizSize(n.size),
          }
        };
      }),
      ...raw.edges.map(e => ({
        group: 'edges',
        data: { id: e.id, source: e.source, target: e.target }
      }))
    ];

    /* ── init Cytoscape ───────────────────────────────────────── */
    const cy = cytoscape({
      container: document.getElementById('cy'),
      elements,
      style: [
        {
          selector: 'node',
          style: {
            'background-color':     'data(color)',
            'width':                'data(size)',
            'height':               'data(size)',
            'label':                'data(label)',
            'font-size':            11,
            'color':                '#ffffff',
            'text-outline-color':   '#111111',
            'text-outline-width':   2,
            'text-valign':          'center',
            'text-halign':          'center',
            'min-zoomed-font-size': 14,
            'border-width':         0,
          }
        },
        {
          selector: 'edge',
          style: {
            'width':       1,
            'line-color':  '#666666',
            'opacity':     0.4,
            'curve-style': 'straight',
          }
        },
        {
          selector: '.dimmed',
          style: { 'opacity': 0.07 }
        },
        {
          selector: 'node.highlighted',
          style: {
            'border-width': 2.5,
            'border-color': '#f0c040',
            'opacity':      1,
          }
        },
        {
          selector: 'edge.highlighted',
          style: {
            'line-color': '#f0c040',
            'opacity':    0.75,
            'width':      2,
          }
        },
        {
          selector: 'node.neighbour',
          style: { 'opacity': 1 }
        }
      ],
      layout:          { name: 'preset' },
      wheelSensitivity: 0.3,
      minZoom:          0.05,
      maxZoom:          8,
    });

    /* ── run CoSE layout ──────────────────────────────────────── */
    const layout = cy.layout({
      name:             'cose',
      animate:          false,        // skip per-tick repaints → much faster
      randomize:        true,
      componentSpacing: 80,
      nodeRepulsion:    () => 450000,
      idealEdgeLength:  () => 45,
      edgeElasticity:   () => 100,
      gravity:          80,
      numIter:          1000,
      initialTemp:      200,
      coolingFactor:    0.95,
      minTemp:          1.0,
      fit:              true,
      padding:          30,
    });

    layout.on('layoutstop', () => {
      document.getElementById('loader').style.display = 'none';
    });

    layout.run();

    /* ── search ───────────────────────────────────────────────── */
    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');

    function applySearch(val) {
      searchClear.style.display = val ? 'block' : 'none';
      cy.startBatch();
      cy.elements().removeClass('dimmed highlighted neighbour');
      if (val) {
        const matched = cy.nodes().filter(n =>
          n.data('label').toLowerCase().includes(val)
        );
        if (matched.length) {
          cy.nodes().addClass('dimmed');
          cy.edges().addClass('dimmed');
          matched.removeClass('dimmed').addClass('highlighted');
          matched.connectedEdges().removeClass('dimmed').addClass('highlighted');
          matched.neighborhood('node').removeClass('dimmed').addClass('neighbour');
        }
      }
      cy.endBatch();
    }

    searchInput.addEventListener('input', function () {
      applySearch(this.value.toLowerCase().trim());
    });
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      applySearch('');
      searchInput.focus();
    });

    /* ── node click ───────────────────────────────────────────── */
    function showInfo(node) {
      const neighbours = node.neighborhood('node');
      const edges      = node.connectedEdges();

      cy.startBatch();
      cy.elements().removeClass('dimmed highlighted neighbour');
      cy.nodes().addClass('dimmed');
      cy.edges().addClass('dimmed');
      node.removeClass('dimmed').addClass('highlighted');
      neighbours.removeClass('dimmed').addClass('neighbour');
      edges.removeClass('dimmed').addClass('highlighted');
      cy.endBatch();

      document.getElementById('info-name').textContent =
        node.data('label');
      document.getElementById('info-type').textContent =
        node.data('type') === 'publisher' ? 'Editore' : 'Autore';
      document.getElementById('info-degree').textContent =
        `${node.degree(false)} connession${node.degree(false) === 1 ? 'e' : 'i'}`;

      const list = document.getElementById('info-connections');
      list.innerHTML = '';
      neighbours
        .sort((a, b) => a.data('label').localeCompare(b.data('label'), 'it'))
        .forEach(n => {
          const li = document.createElement('li');
          li.textContent = n.data('label');
          li.addEventListener('click', () => showInfo(n));
          list.appendChild(li);
        });

      document.getElementById('info-panel').style.display = 'block';
    }

    function clearSelection() {
      cy.startBatch();
      cy.elements().removeClass('dimmed highlighted neighbour');
      cy.endBatch();
      document.getElementById('info-panel').style.display = 'none';
    }

    cy.on('tap', 'node', evt => showInfo(evt.target));
    cy.on('tap', evt => { if (evt.target === cy) clearSelection(); });
    document.getElementById('info-close').addEventListener('click', clearSelection);

    /* ── zoom controls ────────────────────────────────────────── */
    document.getElementById('zoom-in').addEventListener('click',
      () => cy.animate({ zoom: { level: cy.zoom() * 1.4, renderedPosition: { x: cy.width() / 2, y: cy.height() / 2 } }, duration: 200 }));
    document.getElementById('zoom-out').addEventListener('click',
      () => cy.animate({ zoom: { level: cy.zoom() / 1.4, renderedPosition: { x: cy.width() / 2, y: cy.height() / 2 } }, duration: 200 }));
    document.getElementById('zoom-fit').addEventListener('click',
      () => cy.animate({ fit: { padding: 30 }, duration: 300 }));

  })();
  </script>
</body>
</html>
